[pytest]
# 테스트 파일을 찾을 기본 폴더.
testpaths = tests

# utils 같은 로컬 모듈을 import할 수 있도록 현재 폴더를 Python 경로에 추가한다.
pythonpath = .

# -ra: 테스트 결과 요약을 조금 더 자세히 보여준다.
# --strict-markers: 등록하지 않은 marker를 쓰면 실수로 보고 에러를 낸다.
addopts = -ra --strict-markers

# marker는 테스트에 붙이는 이름표다.
# 예: pytest -m student 로 수강생 테스트만 실행할 수 있다.
markers =
    p0: P0 우선순위 테스트
    p1: P1 우선순위 테스트
    p2: P2 우선순위 테스트
    smoke: 기본 동작 확인 테스트
    student: 수강생 권한 API 테스트
    teacher: 교육자 권한 API 테스트
    auth: 인증/권한 경계 테스트
    safety: 운영 서비스 보호 정책 관련 테스트
